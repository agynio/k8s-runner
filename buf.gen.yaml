version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/agynio/k8s-runner/internal/.gen

inputs:
  - module: buf.build/agynio/api
    paths:
      - agynio/api/runner/v1
      - agynio/api/runners/v1
      - agynio/api/gateway/v1

plugins:
  - remote: buf.build/protocolbuffers/go
    out: internal/.gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: internal/.gen
    opt:
      - paths=source_relative
