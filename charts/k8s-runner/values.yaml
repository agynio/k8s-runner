nameOverride: ""
fullnameOverride: ""

global:
  imageRegistry: ""
  imagePullSecrets: []

image:
  registry: ""
  repository: ghcr.io/agynio/k8s-runner
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

replicaCount: 1
revisionHistoryLimit: 10
updateStrategy: {}

deploymentAnnotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

automountServiceAccountToken: true

rbac:
  create: true
  clusterWide: false
  rules:
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list", "watch", "create", "delete", "patch"]
    - apiGroups: [""]
      resources: ["pods/exec"]
      verbs: ["create"]
    - apiGroups: [""]
      resources: ["pods/log"]
      verbs: ["get"]
    - apiGroups: [""]
      resources: ["persistentvolumeclaims"]
      verbs: ["get", "list", "create", "delete"]
    - apiGroups: [""]
      resources: ["events"]
      verbs: ["get", "list", "watch"]

podAnnotations: {}
podLabels: {}

podSecurityContext:
  enabled: false
  fsGroup: null

securityContext:
  enabled: true
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

priorityClassName: ""
terminationGracePeriodSeconds: null

service:
  enabled: true
  type: ClusterIP
  annotations: {}
  labels: {}
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP

containerPorts:
  - name: grpc
    containerPort: 50051
    protocol: TCP

command: []
args: []
env:
  - name: GRPC_ADDR
    value: "0.0.0.0:50051"
  - name: KUBE_NAMESPACE
    value: "agyn-workloads"
  - name: RUNNER_ID
    # Placeholder — override with the UUID assigned by the bootstrap process.
    value: "439e0da2-88cd-46d7-bb9c-56c723c15606"
  - name: PVC_STORAGE_SIZE
    value: "10Gi"
  - name: ZITI_ENABLED
    value: "false"
  - name: ZITI_MANAGEMENT_ADDRESS
    value: "ziti-management:50051"
  - name: ZITI_LEASE_RENEWAL_INTERVAL
    value: "2m"
  - name: ZITI_SERVICE_NAME
    value: "runner"
  - name: LOG_LEVEL
    value: "info"
envFrom: []
extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""

configMounts: []
extraVolumeMounts: []
extraVolumes: []

initContainers: []
extraContainers: []

lifecycle: {}

livenessProbe:
  enabled: true
  tcpSocket:
    port: grpc
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  tcpSocket:
    port: grpc
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1

startupProbe:
  enabled: false

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null
  metrics: []
  behavior: {}

pdb:
  enabled: false
  minAvailable: null
  maxUnavailable: null

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}
  hosts: []
  tls: []

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: ""
    scrapeTimeout: ""
    honorLabels: false
    labels: {}
    annotations: {}
    relabelings: []
    metricRelabelings: []
    endpoints:
      - port: grpc
        path: /metrics
        interval: ""
        scrapeTimeout: ""
