name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf bindings
        run: buf generate buf.build/agynio/api --path agynio/api/runner/v1 --template ./buf.gen.yaml

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: ${{ github.event_name == 'pull_request' && format('e2e-pr-{0}', github.event.pull_request.number) || 'e2e-main' }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: agynio/bootstrap
          path: bootstrap

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.34.3

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Bootstrap cluster
        run: cd bootstrap && ./apply.sh -y

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          cp bootstrap/stacks/k8s/.kube/agyn-local-kubeconfig.yaml ~/.kube/config

      - name: Verify platform health
        run: bootstrap/.github/scripts/verify_platform_health.sh

      - name: Build k8s-runner image
        run: docker build -t k8s-runner:dev .

      - name: Import image into k3d
        run: k3d image import k8s-runner:dev -c agyn-local

      - name: Create workloads namespace
        run: kubectl create namespace agyn-workloads --dry-run=client -o yaml | kubectl apply -f -

      - name: Install k8s-runner
        run: |
          helm dependency build charts/k8s-runner
          helm install k8s-runner charts/k8s-runner \
            -n platform \
            --set image.repository=k8s-runner \
            --set image.tag=dev \
            --set image.pullPolicy=Never \
            --set fullnameOverride=k8s-runner \
            --set rbac.clusterWide=true \
            --set securityContext.runAsNonRoot=false
          echo "Waiting for k8s-runner deployment to be ready..."
          if ! kubectl rollout status deployment/k8s-runner -n platform --timeout=120s; then
            echo "=== Pod status ==="
            kubectl get pods -n platform -l app.kubernetes.io/name=k8s-runner -o wide
            echo "=== Pod describe ==="
            kubectl describe pod -n platform -l app.kubernetes.io/name=k8s-runner
            echo "=== Pod logs ==="
            kubectl logs -n platform -l app.kubernetes.io/name=k8s-runner --tail=100 || true
            echo "=== Events ==="
            kubectl get events -n platform --sort-by='.lastTimestamp' | tail -20
            exit 1
          fi

      - name: Install DevSpace
        run: |
          curl -L -o /tmp/devspace "https://github.com/devspace-sh/devspace/releases/latest/download/devspace-linux-amd64"
          sudo install -m 0755 /tmp/devspace /usr/local/bin/devspace
          devspace version

      - name: Run e2e tests
        run: devspace run-pipeline test-e2e
