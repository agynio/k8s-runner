name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf bindings
        run: buf generate --include-imports buf.build/agynio/api --path agynio/api/runner/v1 --path agynio/api/ziti_management/v1 --template ./buf.gen.yaml

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: ${{ github.event_name == 'pull_request' && format('e2e-pr-{0}', github.event.pull_request.number) || 'e2e-main' }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: agynio/bootstrap
          path: bootstrap

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.34.3

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Bootstrap cluster
        run: cd bootstrap && ./apply.sh -y

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          cp bootstrap/stacks/k8s/.kube/agyn-local-kubeconfig.yaml ~/.kube/config

      - name: Verify platform health
        run: bootstrap/.github/scripts/verify_platform_health.sh

      - name: Install DevSpace
        run: |
          curl -fsSL https://github.com/devspace-sh/devspace/releases/latest/download/devspace-linux-amd64 \
            -o /usr/local/bin/devspace
          chmod +x /usr/local/bin/devspace
          devspace version

      - name: Deploy k8s-runner from source
        run: devspace run deploy -n platform

      - name: Run e2e tests
        run: devspace run test-e2e -n platform

      - name: Restore ArgoCD sync
        if: always()
        run: devspace run restore-argocd -n platform
